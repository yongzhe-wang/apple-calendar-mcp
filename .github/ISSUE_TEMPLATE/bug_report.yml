name: Bug report
description: Report a defect — regression, crash, or incorrect behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Keep answers concise and grounded in observed evidence.
        If a section cannot be answered from the evidence, respond with exactly `NOT_ENOUGH_INFO`.

        **Do not file security vulnerabilities here.** Use GitHub Security Advisories (see the Security link above).
  - type: dropdown
    id: bug_type
    attributes:
      label: Bug type
      description: Pick the category that best matches.
      options:
        - Regression (worked on a previous version, now fails)
        - Crash (server exits unexpectedly)
        - Incorrect behavior (wrong output / wrong event / missing field)
        - Permission / macOS integration issue
        - Schema / validation issue (zod rejects a valid input, or accepts an invalid one)
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: Which tool is affected?
      options:
        - list_calendars
        - list_events
        - search_events
        - create_event
        - update_event
        - delete_event
        - server startup / not a specific tool
        - "multiple"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence statement of what is broken. If evidence is insufficient, respond with exactly `NOT_ENOUGH_INFO`.
      placeholder: "create_event on a writable iCloud calendar returns an event with empty notes, even when notes is passed."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Shortest deterministic repro. Include the exact tool args when possible.
      placeholder: |
        1. Start apple-calendar-mcp 0.1.0 via claude mcp add.
        2. Call create_event with {"title": "x", "start_date": "2026-04-21T10:00:00Z", "end_date": "2026-04-21T11:00:00Z", "notes": "hello"}.
        3. Observe the returned event has no `notes` field.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: 'The returned event should have `notes: "hello"`.'
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The returned event has `notes` absent.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: apple-calendar-mcp version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.4"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "v22.14.0"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      description: Which client invoked the server (e.g. Claude Code 1.x, Cursor, custom).
      placeholder: "Claude Code 1.7.2"
    validations:
      required: true
  - type: input
    id: install_method
    attributes:
      label: Install method
      description: How the server was installed / launched.
      placeholder: "npx -y apple-calendar-mcp"
  - type: textarea
    id: logs
    attributes:
      label: Logs / stderr / screenshots
      description: Include redacted stderr from the MCP server, relevant Calendar.app state, or screenshots. Redact private event data.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Last-known-good version, workaround, anything else relevant.
