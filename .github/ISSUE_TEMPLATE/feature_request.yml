name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Help us evaluate this request with concrete use cases and tradeoffs.
        Before filing: check `VISION.md` for non-goals. Some features belong in a separate MCP server, not this one.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line statement of the requested capability.
      placeholder: Add an `attendees` field to `create_event` and `update_event`.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: User pain this solves and why existing tools are insufficient.
      placeholder: LLM can create an event but can't invite anyone, so users have to open Calendar.app to add attendees.
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Desired behavior, schema changes, and AppleScript strategy as specific as possible.
      placeholder: "Extend CreateEventInput with attendees?: string[] of emails; AppleScript adds attendees via `make new attendee` with `email:` property."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Calendar.app URL scheme; downstream MCP server that composes this one.
  - type: textarea
    id: scope_check
    attributes:
      label: Scope check
      description: Why does this belong in this repo, vs. a separate MCP server or the LLM's prompt?
      placeholder: Attendee management is a first-class Calendar.app capability and can't be expressed via the existing tools.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits, how often, how big the improvement is.
      placeholder: |
        Affected: anyone scheduling meetings via Claude Code.
        Frequency: multiple times per week.
        Benefit: removes a manual step.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence / examples
      description: Prior art, links, screenshots of the friction.
  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: Backward-compat constraints, related issues, anything else relevant.
